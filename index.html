<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-add {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-add:hover {
            background: #5568d3;
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
            position: relative;
        }

        .task-item:hover {
            background: #f0f0f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
            opacity: 0.7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            color: #333;
            word-break: break-word;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .task-text:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .task-text.editing {
            background: white;
            padding: 8px 12px;
            border: 2px solid #667eea;
        }

        .edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
        }

        .edit-input:focus {
            outline: none;
        }

        .btn-save {
            padding: 6px 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }

        .btn-save:hover {
            background: #45a049;
        }

        .btn-cancel {
            padding: 6px 12px;
            background: #999;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-cancel:hover {
            background: #888;
        }

        .btn-delete {
            padding: 6px 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .btn-edit {
            padding: 6px 12px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            margin-right: 5px;
            transition: background 0.3s;
        }

        .btn-edit:hover {
            background: #e68900;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 My Task List</h1>
        
        <div class="input-container">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter a new task..." 
                autocomplete="off"
            >
            <button class="btn-add" onclick="addTask()">Add</button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div id="emptyState" class="empty-state">
            No tasks yet. Add one to get started!
        </div>

        <div class="stats">
            <div class="stat-item">
                <div>Total Tasks</div>
                <div class="stat-number" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div>Completed</div>
                <div class="stat-number" id="completedCount">0</div>
            </div>
            <div class="stat-item">
                <div>Pending</div>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
        </div>
    </div>

    <!-- External JavaScript file -->
    <script src="app.js"></script>
</body>
</html>
